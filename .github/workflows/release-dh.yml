name: Release dh CLI

on:
  push:
    tags:
      - 'dh-v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. dh-v0.0.2)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: dh-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: dh-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: dh-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: dh-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: dh-windows-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p deepharness-cli --target ${{ matrix.target }}
          else
            cargo build --release -p deepharness-cli --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (Unix)
        if: runner.os != 'Windows' && matrix.cross != true
        run: |
          strip target/${{ matrix.target }}/release/dh
        shell: bash

      - name: Stage binary
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/dh.exe dist/${{ matrix.asset_name }}
          else
            cp target/${{ matrix.target }}/release/dh dist/${{ matrix.asset_name }}
          fi
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display downloaded assets
        run: ls -lah dist/

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true

  publish-npm:
    name: Publish npm package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm dependencies
        working-directory: npm
        run: npm install

      - name: Pre-build npm package
        working-directory: npm
        run: node scripts/prebuild.js

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag latest
